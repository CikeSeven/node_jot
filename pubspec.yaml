name: node_jot
description: "A new Flutter project."

publish_to: 'none' # Remove this line if you wish to publish to pub.dev

version: 0.1.0+1

environment:
  sdk: ^3.7.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.6.1
  isar: ^3.1.0+1
  isar_flutter_libs: ^3.1.0+1
  path_provider: ^2.1.5
  uuid: ^4.5.1
  cryptography: ^2.7.0
  shared_preferences: ^2.5.3
  intl: ^0.19.0
  web_socket_channel: ^3.0.3
  flutter_markdown: ^0.7.7+1

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0
  build_runner: ^2.4.13
  isar_generator: ^3.1.0+1
  ffi: ^2.2.0
  flutter_launcher_icons: ^0.14.4

flutter:

  uses-material-design: true
  fonts:
    - family: HarmonyOSSansSC
      fonts:
        - asset: assets/fonts/harmonyos_sans_sc/HarmonyOS_Sans_SC_Regular.ttf
          weight: 400
        - asset: assets/fonts/harmonyos_sans_sc/HarmonyOS_Sans_SC_Medium.ttf
          weight: 500
        - asset: assets/fonts/harmonyos_sans_sc/HarmonyOS_Sans_SC_Bold.ttf
          weight: 700

flutter_launcher_icons:
  android: true
  ios: true
  windows:
    generate: true
    image_path: assets/icons/app_icon.png
    icon_size: 256
  image_path: assets/icons/app_icon.png
  adaptive_icon_background: "#F2F1F7"
  adaptive_icon_foreground: assets/icons/app_icon_fg.png
  adaptive_icon_foreground_inset: 24
  remove_alpha_ios: true
